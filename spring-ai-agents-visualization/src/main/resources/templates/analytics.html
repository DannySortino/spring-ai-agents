<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: page('Analytics', 'analytics', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <h2>Performance Analytics</h2>
        <p>Execution time statistics and bottleneck identification</p>
    </div>

    <div id="analytics-overview" class="chart-container">
        <h3>Agent Execution Times</h3>
        <svg id="overview-chart" width="100%" height="300"></svg>
    </div>

    <div id="agent-drill-down" style="display:none;">
        <div class="chart-container">
            <h3>Node Breakdown — <span id="drill-agent-name" class="mono"></span></h3>
            <svg id="node-chart" width="100%" height="300"></svg>
        </div>
    </div>

    <div class="empty-state" id="analytics-empty" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1.5 1.75V13.5h13.75"/><path d="M15.78 4.22l-5.25 5.25"/>
        </svg>
        <h3>No execution data yet</h3>
        <p>Run some agents to start collecting performance metrics.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script th:src="@{/agents-ui/js/analytics-charts.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadAnalytics());
    </script>
</div>
</body>
</html>
